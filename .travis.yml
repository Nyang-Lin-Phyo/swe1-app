language: python

python:
  - "3.11"

before_install:
  - cd djangoHelloWorld

install:
  - pip install -r requirements.txt

script:
  - black --check .
  - flake8 .
  - coverage run manage.py test

after_success:
  - coveralls

deploy:
  provider: elasticbeanstalk
  region: "us-east-1"
  app: "djangoHelloWorld"
  env: "DjangoHelloWorld-env"
  bucket_name: "elasticbeanstalk-us-east-1-180382394287"
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
  skip_cleanup: true
  acl: private
  on:
    branch: main