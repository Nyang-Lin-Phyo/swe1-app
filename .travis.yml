language: python

python:
  - "3.11"

before_install:
  - cd djangoHelloWorld

install:
  - pip install -r requirements.txt

script:
  - black --check .
  - flake8 .
  - coverage run manage.py test

after_success:
  - coveralls

deploy:
  provider: elasticbeanstalk
  region: "us-east-1"                # EB region
  app: "djangoHelloWorld"            # EB app name
  env: "DjangoHelloWorld-env"        # EB environment
  bucket_name: "elasticbeanstalk-us-east-1-123456789012" # your EB S3 bucket
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
  on:
    branch: main